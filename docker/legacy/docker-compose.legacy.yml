# LEGACY COMPOSE FILE
# This compose file belongs to the early prototype version.
# It is NOT aligned with the v0 architecture (task-based backtest).
# Kept for reference only.

##
version: "3.9"

services:
  # 前端 React + Vite + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile 
    container_name: frontend
    environment:
      VITE_API_BASE: "http://localhost:5000/api"   # 前端请求 API 的 base 路径
    ports:
      - "3000:80"             # 浏览器访问 http://localhost:3000
    depends_on:
      - api
    networks:
      - appnet

  # 后端 .NET API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"           # 直接调试 API 时用；仅前端访问可删掉
    networks:
      - appnet

  zipline:
    build:
      context: ./fork-zipline
      dockerfile: Dockerfile
    container_name: zipline
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      VITE_ZIPLINE_BASE: "http://localhost:8000"
    # environment:
    #   EXAMPLE_VAR: "value"
    #   ANOTHER_VAR: "123"
    volumes:
      - ./fork-zipline/data:/app/data
      - ./fork-zipline/new_engine_starter/src/ultimate_data:/app/ultimate_data
      # 需要的话在这里注入环境变量，比如数据库 / API 密钥
      # EXAMPLE_VAR: "value"
    # 如果你要覆盖 Dockerfile 的 CMD，用 command：
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 2s
      retries: 3
    networks:
      - appnet


  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: wanglihao998734
      POSTGRES_DB: Alpha-Deputy
    expose: 
      - "5432"
    networks:
      - appnet
    volumes:
      - ./pgdata:/var/lib/postgresql/data


networks:
  appnet:


